# Registers the in-cluster zot registry with Argo CD as an OCI repository
# credential template (secret-type: repo-creds, not repository): the
# argocd-repo-server matches repo-creds secrets by URL *prefix* (see
# util/db/repository_secrets.go's getRepositoryCredentialIndex,
# strings.HasPrefix on the normalized URL), so this single secret applies to
# every pack Deliver() addresses under this host
# (oci://zot.cube-idp-system.svc.cluster.local:5000/packs/<name>), not just
# one hardcoded pack path. A plain "repository" secret-type (the brief's
# original sketch) only exact-matches a single repoURL and would silently
# leave every other pack's OCI pull unauthenticated-and-unregistered — same
# host, still failing to negotiate plain HTTP.
#
# Field names verified against argo-cd v3.4.5 source
# (pkg/apis/application/v1alpha1/repository_types.go,
# util/db/repository_secrets.go's secretToRepository/repositoryToSecret):
# the plain-HTTP-registry flag is `insecureOCIForceHttp` (bool), NOT
# `insecure` (that field means "skip TLS cert verification", a different
# thing, and is documented for git/SSH transports). `type: oci` (not
# `helm`) selects the native, non-Helm OCI application-source code path
# documented at
# https://argo-cd.readthedocs.io/en/stable/user-guide/oci/#oci-repositories-special-cases.
apiVersion: v1
kind: Secret
metadata:
  name: cube-idp-zot-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  url: oci://zot.cube-idp-system.svc.cluster.local:5000
  name: cube-idp-zot
  type: oci
  enableOCI: "true"
  insecureOCIForceHttp: "true"
