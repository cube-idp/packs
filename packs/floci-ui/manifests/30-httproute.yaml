# Every schema-defaulted field written out explicitly, copying the shipped
# floci/argocd/gitea route style (argocd SSA-diff rule — a desired manifest that
# omits a server-defaulted field reports a permanent OutOfSync; see
# packs/floci/manifests/30-httproute.yaml). hostnames via D15's ${GATEWAY_FQDN}
# (bare host, no port — Gateway API hostnames cannot carry ports);
# ${GATEWAY_HOST} in pack.cue's expose block keeps host[:port] semantics for the
# displayed URL.
#
# Backend is the floci-ui Service (port 4500 — the console UI; verified the
# only port this image serves). Browsers reach the console at
# https://floci-ui.${GATEWAY_HOST}.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: floci-ui
  namespace: floci
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cube-idp
      namespace: ${GATEWAY_PACK}
  hostnames: ["floci-ui.${GATEWAY_FQDN}"]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - group: ""
          kind: Service
          name: floci-ui
          port: 4500
          weight: 1
