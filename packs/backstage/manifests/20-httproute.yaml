# Every schema-defaulted field written out explicitly, copying the shipped
# gitea/argocd route's style (argocd SSA-diff rule — see
# packs/gitea/manifests/20-httproute.yaml). hostnames via D15's
# ${GATEWAY_FQDN} (bare host, no port — Gateway API hostnames cannot carry
# ports); ${GATEWAY_HOST} in pack.cue's expose block keeps host[:port]
# semantics for URLs.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backstage
  namespace: backstage
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cube-idp
      namespace: ${GATEWAY_PACK}
  hostnames: ["backstage.${GATEWAY_FQDN}"]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - group: ""
          kind: Service
          name: backstage
          port: 7007
          weight: 1
