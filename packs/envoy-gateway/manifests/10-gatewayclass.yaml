# envoy-gateway pack: a full cube-idp gateway implementation. Set
# spec.gateway.pack: envoy-gateway in cube.yaml — this pack provides the
# GatewayClass, the Gateway named cube-idp (20-gateway.yaml), and pins the
# data-plane service to the cube-idp NodePorts via the EnvoyProxy config
# below (parametersRef).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: cube-idp
    namespace: envoy-gateway
---
# Pins the generated Envoy data-plane Service to NodePort 30443/30080 (the
# same host-port mapping packs/traefik relies on, see
# internal/cluster/kindp/merge.go), and names it explicitly (R7b, spec
# §5.7b).
#
# envoyService.name = cube-idp-gateway (R7b): the F9 root cause (found live
# on the first envoy e2e leg, 2026-07-15, cluster fix-envoy-dbg) was never
# "the data-plane Service must be unnamed" — it was that an earlier revision
# named it "envoy-gateway", the exact name of the CONTROLLER's own Service,
# which every proxy's static bootstrap dials for xDS
# (envoy-gateway.envoy-gateway.svc:18000, hardcoded in EG v1.3.0). The
# generated proxy Service hijacked that Service's selector onto the proxy
# pods, the proxy's xDS dial landed on itself (connection refused), no
# listener was ever programmed, and every host connection to the NodePort
# reset — while the control plane reported Programmed=True and
# attachedRoutes=3. "cube-idp-gateway" is a stable, NON-colliding name: it
# is free (nothing else in the envoy-gateway namespace claims it — pinned by
# TestStarterPacksRender's collision check), so EG's generated proxy Service
# claims it without hijacking anything. Naming it (rather than leaving it to
# EG's generated envoy-<ns>-<gateway>-<hash> name) is what lets pack.cue's
# gatewayService: block (below) give `up`'s CoreDNS *.<host> rewrite a
# stable target — closing the KNOWN GAP where in-cluster *.<host> clients
# resolved to the CONTROLLER Service instead of the data plane. The
# StrategicMerge NodePort patch below is name-agnostic (it targets the
# generated Service by its port numbers, not its name), so naming this
# Service changes nothing about how the patch applies.
#
# externalTrafficPolicy is pinned to Cluster: the EnvoyProxy CRD schema
# DEFAULTS it to Local (verified against the live 1.3.0 CRD), and Local
# breaks kind's docker-proxy -> NodePort delivery unless kube-proxy keeps
# the (already-NATed) client on a pod-bearing node. Cluster trades away
# client source-IP preservation, which cube-idp does not need locally.
#
# Verified against the pinned chart's CRD (gateway-helm 1.3.0,
# crds/generated/gateway.envoyproxy.io_envoyproxies.yaml): envoyService is
# a first-class home for `type: NodePort`/`externalTrafficPolicy` but has
# NO `ports` property — the structural schema would silently prune one,
# leaving Kubernetes to auto-assign random NodePorts. Exact port numbers
# therefore go through the schema's `patch` field: a StrategicMerge over
# the generated Service (applied via strategicpatch.StrategicMergePatch in
# EG v1.3.0's api/v1alpha1/kubernetes_helpers.go), keyed on ServicePort's
# `port` merge key — and the generated Service's port numbers equal the
# Gateway's listener ports (8000/8443, per Service() in EG v1.3.0's
# internal/infrastructure/kubernetes/proxy/resource_provider.go), so these
# entries merge nodePort into the right generated ports. Runtime honor is
# arbitrated by Task 13's envoy e2e smoke.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: cube-idp
  namespace: envoy-gateway
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        name: cube-idp-gateway
        type: NodePort
        externalTrafficPolicy: Cluster
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - port: 8000
                  nodePort: 30080
                - port: 8443
                  nodePort: 30443
