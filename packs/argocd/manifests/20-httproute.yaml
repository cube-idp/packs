# Schema-defaulted fields written out explicitly — same rule (and reason)
# as packs/gitea/manifests/20-httproute.yaml: Argo CD's SSA-based diff
# treats server-defaulted fields absent from the desired manifest as a
# permanent OutOfSync.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cube-idp
      namespace: ${GATEWAY_PACK}
  hostnames: ["argocd.cube-idp.localtest.me"]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
