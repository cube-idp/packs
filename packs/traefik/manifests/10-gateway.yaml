# certificateRefs group/kind are written out explicitly even though the
# Gateway API CRD defaults them ("" / Secret): Argo CD's SSA-based diff
# reports desired-omits-what-live-has as a permanent OutOfSync (found on
# the Task 14 argocd e2e leg). Same rule as packs/gitea/manifests/
# 20-httproute.yaml — keep any new schema-defaulted list-entry fields
# explicit.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cube-idp
  namespace: traefik
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces: {from: All}
    - name: websecure
      port: 8443
      protocol: HTTPS
      allowedRoutes:
        namespaces: {from: All}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: cube-idp-gateway-tls
