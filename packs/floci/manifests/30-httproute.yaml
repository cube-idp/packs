# Every schema-defaulted field written out explicitly, copying the shipped
# backstage/gitea/argocd route's style (argocd SSA-diff rule — a desired
# manifest that omits a server-defaulted field reports a permanent OutOfSync;
# see packs/gitea/manifests/20-httproute.yaml). hostnames via D15's
# ${GATEWAY_FQDN} (bare host, no port — Gateway API hostnames cannot carry
# ports); ${GATEWAY_HOST} in pack.cue's expose block keeps host[:port]
# semantics for the displayed URL.
#
# Backend is the floci Service (port 4566 — the AWS-compatible emulator
# endpoint). SDKs point their endpoint URL at https://floci.${GATEWAY_HOST}.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: floci
  namespace: floci
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cube-idp
      namespace: ${GATEWAY_PACK}
  hostnames: ["floci.${GATEWAY_FQDN}"]
  rules:
    - matches:
        - path: {type: PathPrefix, value: /}
      backendRefs:
        - group: ""
          kind: Service
          name: floci
          port: 4566
          weight: 1
