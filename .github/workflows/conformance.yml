name: conformance
on:
  pull_request:
    paths: ['packs/**']
permissions:
  contents: read
jobs:
  changed:
    runs-on: ubuntu-latest
    outputs: {packs: '${{ steps.diff.outputs.packs }}'}
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - id: diff
        # $GITHUB_BASE_REF as an env var (never ${{ }} into run:) per the
        # Actions injection doctrine; the [ -d ] filter drops deleted or
        # renamed packs and non-pack files (packs/.gitkeep) so the matrix
        # only carries directories that still exist on this PR.
        run: |
          PACKS=$(git diff --name-only "origin/$GITHUB_BASE_REF"... -- packs/ | cut -d/ -f2 | sort -u | while read -r p; do [ -d "packs/$p" ] && echo "$p"; done | jq -Rnc '[inputs]')
          echo "packs=$PACKS" >> "$GITHUB_OUTPUT"
  conformance:
    needs: changed
    if: needs.changed.outputs.packs != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix: {pack: '${{ fromJSON(needs.changed.outputs.packs) }}'}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: '1.24'}
      # Build cube-idp from the (public) main repo — tokenless checkout
      # (P4: CUBE_IDP_READ_TOKEN never set; a public checkout needs no
      # token). The checkout stays until a cube-idp binary release >= 0.2.0
      # exists (v0.1.0 predates pack contract v1); the gateway pack itself
      # now resolves from the published default in the config template
      # (oci://ghcr.io/cube-idp/packs/traefik:0.2.0 — P4 publishes it), so
      # no CUBE_IDP_CONFORMANCE_GATEWAY_REF override is set here anymore.
      - uses: actions/checkout@v4
        with: {repository: cube-idp/cube-idp, path: cube-idp-src}
      - run: cd cube-idp-src && go build -o /usr/local/bin/cube-idp .
      - run: hack/conformance.sh "$PACK"
        env:
          PACK: '${{ matrix.pack }}'
          CUBE_IDP_E2E_GATEWAY_PORT: '18443'
